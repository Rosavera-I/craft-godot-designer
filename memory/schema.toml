[facts]
project_engine = "Godot version (4.x) and renderer (Forward+/Mobile/Compatibility)"
godot_executable = "Godot command or editor path: godot4, godot, custom editor path, or headless command"
gameplay_loop = "Core loop: player verbs, goals, rewards, session length"
project_structure = "Scene layout, folder organization, autoload names, resource paths, and test/demo scenes"
scene_patterns = "Ownership rules, signal conventions, scene composition patterns"
node_naming_convention = "Node naming style, such as Player, Sprite2D, col_player, lbl_score, or HitboxArea"
script_template = "Preferred base class and script pattern, such as CharacterBody2D, Node2D, Area2D, Control, or Node"
signal_convention = "Signal names and payload style, such as hit, died, scored, ready, health_changed"
state_machine_pattern = "How states are represented: enum + match, child state nodes, resources, or animation-driven state"
physics_layer = "Collision layers and masks in use, including named meanings for each layer"
scene_factory_pattern = "How scenes are instantiated and pooled: load, preload, PackedScene exports, or factory nodes"
resource_patterns = "Custom Resource classes, .tres files, exported configs, item/stat definitions, and data ownership"
save_system = "Persistence strategy, save file paths, serialization approach, and what state is saved"
ui_patterns = "Control node layout style, anchors, containers, themes, HUD ownership, and localization approach"
input_method = "Input handling style: _input, _unhandled_input, Input singleton polling, buffering, and remapping"
animation_approach = "AnimationPlayer, AnimatedSprite2D, AnimationTree, sprite frames, tweens, and animation ownership"
audio_setup = "Audio buses, stream players, bus names, one-shot sounds, music transitions, and volume settings"
debug_tools = "Debug approach: print_debug, visible debug overlays, debug draw nodes, console commands, and profiling tools"
tuning_values = "Important exported vars: speeds, timers, health, damage, spawn rates"
autoloads = "Global singletons and their responsibilities"
input_map = "Actions, bindings, and input handling patterns"
performance_budget = "Target FPS, node count limits, draw call budget"
asset_pipeline = "Import settings, source control for assets, naming conventions"

[events]
playtest_note = "Observed playtest feedback or feel issue with context"
design_decision = "Accepted gameplay or architecture decision with rationale"
performance_issue = "Identified bottleneck: CPU, GPU, or memory"
scene_refactor = "Scene tree restructuring with before/after"
tuning_change = "Balance change and observed player impact"
scene_structure_decided = "Node tree layout was confirmed, including root type, child ownership, and signal boundaries"
autoload_registered = "A global singleton was added or changed, with its responsibility and access pattern"
signal_contract_defined = "A signal contract between nodes was agreed, including payload names and receiver ownership"
physics_layer_configured = "Collision layers or masks were set or renamed, with intended interactions"
state_machine_implemented = "A state pattern was chosen or implemented, including transition rules"
resource_type_created = "A custom Resource class or .tres config type was added"
tuning_value_changed = "An exported value was modified for balance or feel, with reason and observed impact"
playtest_feedback_captured = "Player or designer feedback was recorded after a test session"
performance_issue_found = "A bottleneck or frame pacing issue was identified with reproduction context"
